<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aexora Ventures | Luxury Reimagined</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f7f2e8;
      font-family: "Manrope", sans-serif;
    }

    .container {
      width: 90%;
      margin: auto;
    }

    header {
      padding: 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-weight: 800;
    }

    nav a {
      margin-left: 20px;
      color: #aaa;
      text-decoration: none;
    }

    nav a.active {
      color: #fff;
    }

    .hero {
      padding: 100px 0;
      text-align: center;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 3rem;
    }

    .button {
      padding: 12px 24px;
      margin: 10px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: gold;
      color: black;
    }

    .secondary {
      background: transparent;
      border: 1px solid #555;
      color: white;
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: 0.6s;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<header class="container">
  <div class="brand">AEXORA VENTURES</div>
  <nav>
    <a href="#home" class="active">Home</a>
    <a href="#explore">Explore</a>
    <a href="#shop">Shop</a>
    <a href="#founder">Founder</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero reveal" id="home">
  <div class="container">
    <h1>Luxury made modern, clean, and timeless.</h1>
    <p>
      Aexora Ventures curates elevated essentials for modern living.
    </p>

    <button class="button primary">Explore</button>
    <button class="button secondary">Shop Now</button>
  </div>
</section>

<script>
  // Reveal animation
  const reveals = document.querySelectorAll(".reveal");

  function showOnScroll() {
    reveals.forEach(el => {
      const top = el.getBoundingClientRect().top;
      if (top < window.innerHeight - 50) {
        el.classList.add("visible");
      }
    });
  }

  window.addEventListener("scroll", showOnScroll);
  showOnScroll();
</script>

</body>
</html>
